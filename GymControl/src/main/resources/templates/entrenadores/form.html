<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Entrenador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="h4">Formulario de entrenador</h1>
    <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Especialidad</label>
            <input type="text" th:field="*{especialidad}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" th:field="*{telefono}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/entrenadores" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
