<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Membresía</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="h4">Formulario de membresía</h1>
    <form th:action="@{/membresias/guardar}" th:object="${membresia}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Tipo</label>
            <input type="text" th:field="*{tipo}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha de inicio</label>
            <input type="date" th:field="*{fechaInicio}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha de fin</label>
            <input type="date" th:field="*{fechaFin}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Estado</label>
            <input type="text" th:field="*{estado}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/membresias" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
