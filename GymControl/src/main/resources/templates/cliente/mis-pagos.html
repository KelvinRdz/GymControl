<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Mis pagos</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark"><div class="container"><a class="navbar-brand" th:href="@{/home}">GymControl</a><a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a></div></nav>
<div class="container py-4"><h1 class="h3">Historial de pagos</h1><p class="text-muted" th:text="'Cliente: ' + ${usuario.cliente.nombre}"></p>
<div th:if="${#lists.isEmpty(pagos)}" class="alert alert-info">No hay pagos registrados.</div>
<div class="table-responsive" th:unless="${#lists.isEmpty(pagos)}"><table class="table table-striped table-bordered bg-white"><thead class="table-dark"><tr><th>Fecha</th><th>Monto</th></tr></thead><tbody><tr th:each="pago : ${pagos}"><td th:text="${pago.fechaPago}"></td><td th:text="${#numbers.formatDecimal(pago.monto,1,'COMMA',2,'POINT')}"></td></tr></tbody></table></div>
<a class="btn btn-secondary" th:href="@{/home}">Volver</a></div></body></html>
