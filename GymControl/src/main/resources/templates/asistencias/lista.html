<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asistencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
            <li class="nav-item"><a class="nav-link" href="/entrenadores">Entrenadores</a></li>
            <li class="nav-item"><a class="nav-link" href="/membresias">Membresías</a></li>
            <li class="nav-item"><a class="nav-link" href="/pagos">Pagos</a></li>
            <li class="nav-item"><a class="nav-link" href="/rutinas">Rutinas</a></li>
            <li class="nav-item"><a class="nav-link" href="/asistencias">Asistencias</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4">Asistencias</h1>
        <a href="/asistencias/nuevo" class="btn btn-primary btn-sm">Nueva asistencia</a>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="asistencia : ${asistencias}">
                <td th:text="${asistencia.id}"></td>
                <td th:text="${asistencia.fecha}"></td>
                <td th:text="${asistencia.horaIngreso}"></td>
                <td>
                    <a th:href="@{/asistencias/editar/{id}(id=${asistencia.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/asistencias/eliminar/{id}(id=${asistencia.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
