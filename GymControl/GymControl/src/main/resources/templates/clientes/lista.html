<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
            <li class="nav-item"><a class="nav-link" href="/entrenadores">Entrenadores</a></li>
            <li class="nav-item"><a class="nav-link" href="/membresias">Membresías</a></li>
            <li class="nav-item"><a class="nav-link" href="/pagos">Pagos</a></li>
            <li class="nav-item"><a class="nav-link" href="/rutinas">Rutinas</a></li>
            <li class="nav-item"><a class="nav-link" href="/asistencias">Asistencias</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4">Clientes</h1>
        <a href="/clientes/nuevo" class="btn btn-primary btn-sm">Nuevo cliente</a>
    </div>
    <form th:action="@{/clientes}" method="get" class="row g-2 mb-3">
        <div class="col-md-9"><input type="text" name="criterio" th:value="${criterio}" class="form-control" placeholder="Buscar por nombre o número de cédula"></div>
        <div class="col-md-3 d-grid"><button class="btn btn-success" type="submit">Buscar cliente</button></div>
    </form>
    <div th:if="${#lists.isEmpty(clientes)}" class="alert alert-warning">No se encontraron clientes con ese criterio.</div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cédula</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.id}"></td>
                <td th:text="${cliente.nombre}"></td>
                <td th:text="${cliente.cedula}"></td>
                <td th:text="${cliente.telefono}"></td>
                <td th:text="${cliente.correo}"></td>
                <td th:text="${cliente.fechaRegistro}"></td>
                <td>
                    <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
