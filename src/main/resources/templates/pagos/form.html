<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="h4">Formulario de pago</h1>
    <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select th:field="*{cliente}" class="form-select">
                <option value="">Seleccione un cliente</option>
                <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:text="${cliente.nombre + ' - ' + cliente.cedula}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Monto</label>
            <input type="number" step="0.01" th:field="*{monto}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha de pago</label>
            <input type="date" th:field="*{fechaPago}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/pagos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
