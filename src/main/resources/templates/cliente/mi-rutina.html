<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Mi rutina</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark"><div class="container"><a class="navbar-brand" th:href="@{/home}">GymControl</a><a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a></div></nav>
<div class="container py-4"><h1 class="h3">Mi rutina</h1><p class="text-muted" th:text="'Cliente: ' + ${usuario.cliente.nombre}"></p>
<div th:if="${#lists.isEmpty(rutinas)}" class="alert alert-info">Todavía no tienes una rutina asignada.</div>
<div class="card mb-3" th:each="rutina : ${rutinas}"><div class="card-body"><h5 th:text="${rutina.nombre}"></h5><p class="mb-0" th:text="${rutina.descripcion}"></p></div></div>
<a class="btn btn-secondary" th:href="@{/home}">Volver</a></div></body></html>
