<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="h4">Formulario de asistencia</h1>
    <form th:action="@{/asistencias/guardar}" th:object="${asistencia}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" th:field="*{fecha}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Hora de ingreso</label>
            <input type="time" th:field="*{horaIngreso}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/asistencias" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
