<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">GymControl</a>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="h4">Formulario de cliente</h1>
    <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Cédula</label>
            <input type="text" th:field="*{cedula}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" th:field="*{telefono}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" th:field="*{correo}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha de registro</label>
            <input type="date" th:field="*{fechaRegistro}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/clientes" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
